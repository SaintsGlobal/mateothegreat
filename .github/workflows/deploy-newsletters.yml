name: Deploy Newsletters

on:
  push:
    branches:
      - main
    paths:
      - 'content/newsletters/**'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build
        run: npm run build

      - name: Publish approved newsletters
        run: npm run publish:newsletters
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
